name: Validar projeto

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  testes:
    name: Testes e compilação
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Preparar dependências
        run: npm ci
      - name: Executar testes
        run: npm test
      - name: Validar todas as aplicações
        run: npm run build
      - name: Preparar bibliotecas do aplicativo Linux
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Conferir aplicativo desktop
        run: cargo check --manifest-path apps/web/src-tauri/Cargo.toml
